services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rabitus
      POSTGRES_USER: rabitus
      POSTGRES_PASSWORD: rabitus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabitus"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      RABITUS_DATABASE_URL: postgresql://rabitus:rabitus@db:5432/rabitus
      RABITUS_JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
      RABITUS_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
